<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="dashboard-wrapper">

  <!-- LOGIN -->
  <div id="loginSection" class="login-box">
    <h1>GOD'S WILL INTERNATIONAL PLACEMENT, INC</h1>
    <p class="subtitle">Medical Professionals Application Form</p>

    <h2>Admin Login</h2>

    <input id="username" placeholder="Username" />
    <input id="password" type="password" placeholder="Password" />

    <button onclick="login()">Login</button>
  </div>

  <!-- DASHBOARD -->
  <div id="adminSection" class="dashboard-box hidden">

    <h1>GOD'S WILL INTERNATIONAL PLACEMENT, INC</h1>
    <p class="subtitle">Medical Professionals Application Form</p>

    <div class="top-bar">
      <h2>Applications Dashboard</h2>
      <button onclick="logout()">Logout</button>
    </div>

    <input id="search" placeholder="Search by Name" onkeyup="renderTable()" />
    <input id="filterJob" placeholder="Filter by Job Category" onkeyup="renderTable()" />

    <table>
      <thead>
        <tr>
          <th>Date Applied</th>
          <th>Name</th>
          <th>Age</th>
          <th>Job Category</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

  </div>

</div>

<script src="main.js"></script>
</body>
</html>
